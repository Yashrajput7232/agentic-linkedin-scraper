version: "3.9"

services:
  # ── MongoDB Database ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:latest
    container_name: linkedin_scraper_db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-scraper}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-linkedin_jobs}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Web Server (Dashboard & API) ──────────────────────────────────
  api:
    build: .
    container_name: linkedin_scraper_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER:-scraper}:${MONGO_PASSWORD:-password}@mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-linkedin_jobs}
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__
      # - ./linkedin_cookies.json:/app/linkedin_cookies.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Collects job IDs continuously ─────────────────────────────────────────
  search:
    build: .
    container_name: linkedin_scraper_search
    command: python search_retriever.py
    env_file: .env
    environment:
      - HEADLESS=true
      - COOKIE_FILE=/app/linkedin_cookies.json
      - MONGODB_URL=mongodb://${MONGO_USER:-scraper}:${MONGO_PASSWORD:-password}@mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-linkedin_jobs}
    # volumes:
      # Mount the cookie file if using file-based cookies instead of LINKEDIN_COOKIES_JSON
      # - ./linkedin_cookies.json:/app/linkedin_cookies.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Fills in full job details continuously ─────────────────────────────────
  details:
    build: .
    container_name: linkedin_scraper_details
    command: python details_retriever.py
    env_file: .env
    environment:
      - HEADLESS=true
      - COOKIE_FILE=/app/linkedin_cookies.json
      - MONGODB_URL=mongodb://${MONGO_USER:-scraper}:${MONGO_PASSWORD:-password}@mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-linkedin_jobs}
    # volumes:
      # - ./linkedin_cookies.json:/app/linkedin_cookies.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
  mongodb_config:
